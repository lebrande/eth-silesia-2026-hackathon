[build]
builder = "RAILPACK"
buildCommand = "pnpm -F main build && cp -r apps/main/.next/static apps/main/.next/standalone/apps/main/.next/static && cp -r apps/main/public apps/main/.next/standalone/apps/main/public"
watchPatterns = ["/apps/main/**"]

[deploy]
preDeployCommand = "pnpm -F main db:migrate"
startCommand = "pnpm -F main start"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
